<!DOCTYPE html>
<html>

<body>
    <button onclick="test()">Generate</button>

    <script>
        function test() {
            fetch("http://localhost:5000/api/image/generate-image", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                },
                body: JSON.stringify({
                    prompt: "a cyberpunk city"
                }),
            })
                .then(res => res.json())
                .then(data => {
                    const img = document.createElement("img");
                    img.src = data.image;
                    img.width = 300;
                    document.body.appendChild(img);
                });
        }
    </script>

</body>

</html>
